name: E2E (Cypress) + Allure (Pages)

on:
  push:
    branches: ['main', 'master']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      # Cypress config reads these env vars directly
      BASE_URL: http://localhost:3000
      BASE_API: http://localhost:3333
      MONGO_URI: mongodb://localhost:27017
      DATABASE_NAME: HopeDB

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            web/package-lock.json

      - name: Install dependencies (api)
        working-directory: api
        run: npm install

      - name: Install dependencies (web)
        working-directory: web
        run: npm install

      - name: Start API + Web
        run: |
          nohup npm run dev --prefix api > api.log 2>&1 &
          nohup npm start --prefix web > web.log 2>&1 &

      - name: Wait for servers
        run: |
          npx --yes wait-on@7.2.0 http://localhost:3333/orphanages http://localhost:3000 --timeout 180000

      - name: Run Cypress (headless)
        working-directory: web
        run: npx cypress run

      - name: Add Allure metadata (Environment/Executor)
        if: always()
        working-directory: web
        run: |
          mkdir -p allure-results

          cat > allure-results/environment.properties <<EOF
          BASE_URL=${BASE_URL}
          BASE_API=${BASE_API}
          DATABASE_NAME=${DATABASE_NAME}
          EOF

          owner="${GITHUB_REPOSITORY%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          report_url="https://${owner}.github.io/${repo}/"
          build_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          cat > allure-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "${GITHUB_WORKFLOW} #${GITHUB_RUN_NUMBER}",
            "buildOrder": ${GITHUB_RUN_NUMBER},
            "buildUrl": "${build_url}",
            "reportUrl": "${report_url}",
            "commit": "${GITHUB_SHA}"
          }
          EOF

      - name: Generate Allure report
        if: always()
        working-directory: web
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report to Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/allure-report

  deploy:
    if: always()
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
